spring:
  application:
    name: agrilink

  datasource:
    url: jdbc:mysql://localhost:3306/agrilink_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: M@yorking14
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

agrilink:
  default-agent-id: AGA-ADMIN001
  commission-rate: 0.05

  jpa:
    open-in-view: false

    africastalking:
      username: your_username
      api-key: ${AFRICASTALKING_API_KEY}
      sender-id: AgriLink